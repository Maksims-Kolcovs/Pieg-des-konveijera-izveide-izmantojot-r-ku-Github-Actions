name: 'Deploy to environment'
description: 'Deploys python-greetings using pm2 to the specified environment'

inputs:
  environment:
    description: 'Target environment: dev, stg, preprod or prod'
    required: true
  port:
    description: 'Port number for the service'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v4

    - name: Clone python-greetings repository
      uses: actions/checkout@v4
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Copy app to stable folder
      shell: cmd
      run: |
        if not exist C:\greetings\${{ inputs.environment }} mkdir C:\greetings\${{ inputs.environment }}
        xcopy /E /I /Y python-greetings C:\greetings\${{ inputs.environment }}

    - name: Create virtual environment
      shell: cmd
      working-directory: C:\greetings\${{ inputs.environment }}
      run: python -m venv venv

    - name: Install pip dependencies
      shell: cmd
      working-directory: C:\greetings\${{ inputs.environment }}
      run: venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop existing service if running
      shell: cmd
      run: pm2 delete greetings-app-${{ inputs.environment }} & EXIT /B 0

    - name: Start service with pm2
      shell: cmd
      working-directory: C:\greetings\${{ inputs.environment }}
      run: pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter "%CD%\venv\Scripts\python.exe" -- --port ${{ inputs.port }}